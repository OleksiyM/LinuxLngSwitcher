name: Rust Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libssl-dev pkg-config
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Run Tests
        run: cargo test
        
      - name: Build
        run: cargo build --release
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GnomeLngSwitcher-binary
          path: target/release/gnome-lng-switcher

      - name: Release Latest
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          files: target/release/gnome-lng-switcher
          prerelease: true
          name: "Latest Build"
          body: "Automatic build of the latest commit on the main branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
